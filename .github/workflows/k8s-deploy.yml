name: Kubernetes Auto Deploy

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build Docker Images
        run: |
          TAG=${{ steps.vars.outputs.sha_short }}
          docker build -t xrpaout-backend:$TAG ./backend
          docker build -t xrpaout-frontend:$TAG ./frontend
          minikube image load xrpaout-backend:$TAG
          minikube image load xrpaout-frontend:$TAG
        shell: bash

      - name: Update Manifest and Deploy
        run: |
          TAG=${{ steps.vars.outputs.sha_short }}
          # The runner is on the server, so we can apply directly
          MANIFEST_PATH="/root/xrpaout-k8s.yaml"
          cp k8s/xrpaout-k8s.yaml $MANIFEST_PATH
          
          sed -i "s|image: xrpaout-backend:.*|image: xrpaout-backend:$TAG|g" $MANIFEST_PATH
          sed -i "s|image: xrpaout-frontend:.*|image: xrpaout-frontend:$TAG|g" $MANIFEST_PATH
          
          kubectl apply -f $MANIFEST_PATH
          kubectl rollout restart deployment xrpaout-deployment
          
          # Optional: Re-establish port forwarding if using screen
          # (Note: Using LoadBalancer or NodePort is recommended over port-forwarding for production)
          screen -X -S portforward-api quit || true
          screen -X -S portforward-web quit || true
          screen -dmS portforward-api kubectl port-forward --address 0.0.0.0 svc/xrpaout-service 13151:13151
          screen -dmS portforward-web kubectl port-forward --address 0.0.0.0 svc/xrpaout-service 13152:13152
        shell: bash



